name: Bug report
description: Report a reproducible problem in a Frog Hill Labs project
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a problem. Do not include passwords, tokens, private keys, personal data, or sensitive infrastructure details.

  - type: textarea
    id: summary
    attributes:
      label: Problem summary
      description: Briefly describe what went wrong.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest reliable sequence that demonstrates the problem.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include relevant versions, operating system, hardware, browser, runtime, or device details.
      placeholder: |
        Project version or commit:
        Operating system:
        Runtime or browser:
        Hardware or device:
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or additional context
      description: Add sanitized logs, screenshots, configuration excerpts, or other useful context.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for the same problem.
          required: true
        - label: I removed secrets and private information from this report.
          required: true

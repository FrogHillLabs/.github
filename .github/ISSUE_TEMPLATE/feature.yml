name: Feature request
description: Suggest an improvement or new capability for a Frog Hill Labs project
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Practical use cases and clearly described constraints are especially helpful.

  - type: textarea
    id: problem
    attributes:
      label: Problem or need
      description: What problem would this solve, or what capability is missing?
      placeholder: Describe the practical need before describing the implementation.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or outcome you would like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe current workarounds or other approaches you considered.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add examples, sketches, compatibility concerns, hardware constraints, or related links.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues for a similar request.
          required: true
        - label: This request does not contain secrets or private information.
          required: true
